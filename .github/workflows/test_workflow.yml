# Run Tests

name: Aviary Tests

on:
  # Trigger on push or pull request events for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  merge_group:
    branches: [ main ]

  # Allow running the workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  # Cancel any existing CI runs if we push to this branch
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  pre_commit:
    # run pre-commit checks
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - uses: pre-commit/action@v3.0.1

  test_ubuntu:
    strategy:
      fail-fast: false
      matrix:
        include:
          # oldest supported versions of openmdao/dymos
          # Note: bugfixes sometimes require incrementing the minimal version of openmdao or dymos.
          #- NAME: oldest
          #  PY: '3.11'
          #  NUMPY: '2.2'
          #  SCIPY: '1.15'
          #  PYOPTSPARSE: 'v2.13.1'
          #  SNOPT: '7.7'
          #  OPENMDAO: '3.43.0'
          #  DYMOS: '1.13.1'

          # latest versions of openmdao/dymos
          - NAME: latest
            OS: ubuntu-24.04
            OPENMDAO_PIXI_ENVIRONMENT: 'py313'
            OPENMDAO_INSTALL_FROM: 'github'
            OPENMDAO: ''
            SNOPT: '7.7'
            DYMOS: 'latest'

    runs-on: ${{ matrix.OS }}

    steps:
      - name: Checkout actions
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/actions
          path: actions

      - name: prepare_testing_environment
        uses: ./actions/.github/actions/prepare_environment
        with:
          NAME: ${{ matrix.NAME }}
          OPENMDAO_PIXI_ENVIRONMENT: ${{ matrix.OPENMDAO_PIXI_ENVIRONMENT }}
          OPENMDAO_INSTALL_FROM: ${{ matrix.OPENMDAO_INSTALL_FROM }}
          OPENMDAO: ${{ matrix.OPENMDAO }}
          SNOPT: ${{ matrix.SNOPT }}
          DYMOS: ${{ matrix.DYMOS }}
          SSH_PRIVATE_KEY: ${{secrets.SSH_PRIVATE_KEY}}
          SSH_KNOWN_HOSTS: ${{secrets.SSH_KNOWN_HOSTS}}
          SNOPT_LOCATION_77: ${{ secrets.SNOPT_LOCATION_77 }}

      - name: Run tests
        shell: bash -l {0}
        run: |
          eval "$(pixi shell-hook -e ${{ matrix.OPENMDAO_PIXI_ENVIRONMENT }} --manifest-path=${{ env.PIXI_MANIFEST }})"
          echo "============================================================="
          echo "Run Tests"
          echo "============================================================="
          #testflo . -n 1 --timeout=200 --show_skipped --coverage --coverpkg aviary
          cd aviary
          cd validation_cases
          cd benchmark_tests
          testflo -n 1 --show_skipped test_bench_FwFm.py
          # Raise error only on merge
          if [[ "${{ inputs.SNOPT }}" ]]; then
            exit 1
          fi

      - name: Checkout actions (again)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/actions
          path: actions
